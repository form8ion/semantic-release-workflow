[settings]
lockfile = true

[tools]
actionlint = "1.7.12"
hk = "1.45.0"
pkl = "0.31.1"
zizmor = "1.25.0"

[tasks."fix:workflows:zizmor"]
run = "zizmor --fix .github/workflows/*.yml"

[tasks."verify:workflows:actionlint"]
run = "actionlint .github/workflows/*.yml"

[tasks."verify:workflows:zizmor"]
run = "zizmor .github/workflows/*.yml"

[tasks."verify:workflows"]
depends = ["verify:workflows:actionlint", "verify:workflows:zizmor"]

[tasks."verify:renovate-config"]
run = "npx --yes --package renovate -- renovate-config-validator"

[tasks.verify]
depends = ["verify:renovate-config", "verify:workflows"]
